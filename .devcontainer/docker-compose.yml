services:
  chromium:
    image: lscr.io/linuxserver/chromium:latest
    container_name: chromium
    security_opt:
      - seccomp:unconfined        # required by Chromium's sandbox in a container
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London          # opens to a blank new tab — add your own sites
    volumes:
      - ./config:/config          # persists your logins/profile across restarts
    ports:
      - "3000:3000"               # web UI (KasmVNC) — Codespaces forwards this
    shm_size: "1gb"
    restart: unless-stopped
