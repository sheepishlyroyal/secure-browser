services:
  chromium:
    image: lscr.io/linuxserver/chromium:latest
    container_name: chromium
    security_opt:
      - seccomp:unconfined        # required by Chromium's sandbox in a container
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London          # opens to a blank new tab — add your own sites
    volumes:
      - ./config:/config          # persists your logins/profile across restarts
    ports:
      - "3000:3000"               # web UI (KasmVNC) — Codespaces forwards this
    shm_size: "1gb"
    restart: unless-stopped

  # Watchdog: if you close Chromium's last window the desktop would otherwise sit blank.
  # This respawns it within seconds (container restart; your ./config profile is kept), so
  # the "Reopen" button just needs to reload the page. Additive — if it ever fails, Chromium
  # still runs exactly as before.
  watchdog:
    image: docker:cli
    container_name: chromium-watchdog
    restart: unless-stopped
    depends_on:
      - chromium
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./watchdog.sh:/watchdog.sh:ro
    command: ["sh", "/watchdog.sh"]
