services:
  # A full Ubuntu (XFCE) desktop streamed over KasmVNC on port 3000 — not just a browser.
  # You get a desktop, a file manager, a terminal, and you can install apps (sudo apt /
  # download .debs). Your files + installed apps persist in ./config across restarts.
  desktop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: desktop
    security_opt:
      - seccomp:unconfined        # needed for sandboxed apps (Chromium/Electron) in a container
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - TITLE=Desktop
    volumes:
      - ./config:/config          # persists your home, installed apps and logins
    ports:
      - "3000:3000"               # web UI (KasmVNC) — Codespaces forwards this
    shm_size: "2gb"               # headroom for browsers / Electron apps
    restart: unless-stopped
